services:
  backend:
    build: ./backend
    volumes:
      - ./backend:/app
    networks:
      - localnet
    command: uvicorn main:app --reload --workers 1 --host 0.0.0.0 --port 8000
    depends_on:
      - mongodb
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: development
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    stdin_open: true
    tty: true
    networks:
      - localnet
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf.template:/etc/nginx/templates/nginx.conf.template:ro
      - ./nginx/html:/usr/share/nginx/html:ro
    environment:
      DEV_MODE: "true"
      NGINX_ENVSUBST_FILTER: DEV_MODE
      NGINX_ENVSUBST_OUTPUT_DIR: /etc/nginx
    networks:
      - localnet
    depends_on:
      - backend
      - frontend
    ports:
      - 127.0.0.1:3004:80
    restart: unless-stopped

  # Production: self-contained nginx with built frontend
  site:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: production
    networks:
      - localnet
      - nginx-proxy
    environment:
      VIRTUAL_HOST: unfairness.janczechowski.com
      LETSENCRYPT_HOST: unfairness.janczechowski.com
      DEV_MODE: "false"
      NGINX_ENVSUBST_FILTER: DEV_MODE
      NGINX_ENVSUBST_OUTPUT_DIR: /etc/nginx
    depends_on:
      - backend
    restart: always
    profiles:
      - production

  mongodb:
    image: mongo:latest
    command: mongod --quiet --logpath /dev/null
    networks:
      - localnet
    volumes:
      - mongodb_data:/data/db
    restart: always

  mongo-express:
    image: mongo-express:latest
    networks:
      - localnet
    profiles:
      - dummy-dont-start-by-default
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017
      ME_CONFIG_BASICAUTH: "false"
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
    ports:
      - "127.0.0.1:4001:8081"
    restart: always

networks:
  localnet:
  nginx-proxy:
    external: true

volumes:
  mongodb_data:
